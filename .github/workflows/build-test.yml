name: Build & Test

# Trigger policy:
#   - push to main only            (validates merge integrity, no double-run)
#   - pull_request open/sync       (covers all feature-branch development)
#   - workflow_call                (release.yml gates on this passing)
#
# Path filter: only fires when something that actually affects test outcomes
# changed - kernel/userspace source, test harness, build/run scripts, or the
# toolchain image. Docs-only changes (README.md, CLAUDE.md, docs/**) skip CI.

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sh'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '.github/workflows/build-test.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sh'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '.github/workflows/build-test.yml'

# Cancel superseded runs on the same ref so a rebased push doesn't keep CI
# burning cycles for the older commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build kernel + ISOs + HDD test image once, fan out tests as artifacts ──
  # Runs on the host runner (not in a container) because generate-hdd.sh
  # spawns its own privileged docker container for loop-device work, which
  # is awkward to nest.  Subsequent test jobs run inside the container.
  # KVM acceleration is deliberately disabled (see run.sh _qemu_accel).
  build:
    name: Build (kernel + ISOs + HDD test image)
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPRESS: '1'
      CCACHE_MAXSIZE: 500M
      HDD_SIZE_MB: 64    # smaller test image -> faster artifact upload

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-main-
            ccache-${{ runner.os }}-

      - name: Build ISOs (kernel + makar.iso + makar-test.iso)
        run: ./run.sh iso build

      - name: Build HDD test image (kernel cached from ISO build)
        run: ./run.sh hdd build

      - name: ccache stats
        if: always()
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/work" -w /work \
            -e CCACHE_DIR=/work/.ccache \
            makar-build:local ccache -s || echo "(ccache stats unavailable)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: makar-build
          path: |
            src/kernel/makar.kernel
            makar.iso
            makar-test.iso
            makar-hdd-test.img
          retention-days: 1
          if-no-files-found: error

  # ── ktest suite (in-kernel unit tests + ring-3 lifecycle) ──────────────────
  # The fastest test job: ~30s on KVM.  Boots makar-test.iso whose grub.cfg
  # autoselects the test_mode entry; the kernel runs ktest_run_all() then
  # exits QEMU via isa-debug-exit.  PASS/FAIL is grepped from serial.
  ktest:
    name: ktest
    needs: build
    runs-on: ubuntu-latest
    container:
      image: arawn780/gcc-cross-i686-elf:fast
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: makar-build

      - name: Run ktest
        run: ./run.sh ktest

      - name: Upload ktest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ktest-log
          path: ktest.log

  # ── GDB ISO boot-checkpoint test ───────────────────────────────────────────
  # Boots makar.iso (interactive grub.cfg, default entry 0) under the QEMU
  # GDB stub and verifies Multiboot 2 magic, boot checkpoints, hardware
  # state, VESA TTY init, background ktest result, and CD-ROM content.
  gdb-iso:
    name: GDB ISO boot
    needs: build
    runs-on: ubuntu-latest
    container:
      image: arawn780/gcc-cross-i686-elf:fast
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: makar-build

      - name: Run GDB ISO boot test
        run: ./run.sh gdb iso

      - name: Upload GDB logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gdb-iso-logs
          path: |
            gdb-test.log
            gdb-serial.log

  # ── GDB HDD boot test ──────────────────────────────────────────────────────
  # Boots makar-hdd-test.img (no CD-ROM) and verifies the kernel reaches
  # shell_run with fat32_mounted() non-zero -- proves GRUB-from-FAT32 boot
  # and the IDE/FAT32 auto-mount path.
  gdb-hdd:
    name: GDB HDD boot
    needs: build
    runs-on: ubuntu-latest
    container:
      image: arawn780/gcc-cross-i686-elf:fast
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: makar-build

      - name: Run GDB HDD boot test
        run: ./run.sh gdb hdd

      - name: Upload GDB logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gdb-hdd-logs
          path: |
            hdd-test-gdb.log
            hdd-test-serial.log

  # NOTE: UI tests (sendkey + serial grep) live in tests/ui_test.sh and
  # are runnable locally via `./run.sh ui`.  They are intentionally
  # NOT wired into this CI workflow: under TCG (no KVM in GHA runners)
  # boot to shell takes 30-60s per scenario, so the suite is slow and
  # historically prone to hanging when QEMU misbehaves on shared
  # infrastructure.  Keep them as a local pre-merge check; revisit if
  # GHA grows KVM support or we move to self-hosted runners.
