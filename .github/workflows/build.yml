name: Build

on:
  push:
    paths:
      - 'src/**'
  pull_request:
    paths:
      - 'src/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # Use the prebuilt i686-elf cross-compiler image from Docker Hub.
    # This eliminates the toolchain download on every run.
    container:
      image: techiekeith/gcc-cross-i686-elf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            nasm \
            xorriso \
            grub-pc-bin \
            grub-common \
            mtools \
            qemu-system-x86 \
            qemu-utils \
            gdb-multiarch

      - name: Build ISO
        run: bash iso.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: makar
          path: makar.iso

      - name: Test boot with QEMU
        run: |
          # Create the disk image if it does not already exist, and export
          # $DISK_IMAGE into the current shell by sourcing the script.
          . ./make-disk.sh

          # Run QEMU and stream serial output to both the log and the console in real-time.
          # To debug locally with GDB: add -s -S flags and connect with
          #   gdb makar.kernel -ex "target remote :1234"
          timeout 20 qemu-system-i386 \
            -cdrom makar.iso \
            -drive file="$DISK_IMAGE",format=raw,media=disk,if=ide,index=0 \
            -serial stdio \
            -display none \
            -no-reboot \
            -no-shutdown \
            -d int,cpu_reset \
            -D qemu-debug.log \
            2>&1 | tee serial.log || true
          grep -q "serial: COM1 ready" serial.log
          grep -q "keyboard: PS/2 IRQ1 handler registered" serial.log
          grep -q "debug: idle loop active" serial.log

      - name: GDB boot test
        shell: bash
        run: |
          # Create the disk image if it does not already exist (reuse from
          # previous step if the workflow runs them sequentially), and export
          # $DISK_IMAGE into the current shell by sourcing the script.
          . ./make-disk.sh

          # Start QEMU with the GDB stub enabled and the CPU frozen at reset (-S).
          qemu-system-i386 \
            -cdrom makar.iso \
            -drive file="$DISK_IMAGE",format=raw,media=disk,if=ide,index=0 \
            -serial stdio \
            -display none \
            -no-reboot \
            -no-shutdown \
            -s -S &
          QEMU_PID=$!

          # Give QEMU a moment to open the GDB stub socket.
          sleep 2

          # Run the GDB test script.  kernel/makar.kernel supplies the
          # debug symbols; gdb-multiarch handles the i386 target.
          timeout 60 gdb-multiarch -batch \
            -ex "source tests/gdb_boot_test.py" \
            src/kernel/makar.kernel \
            2>&1 | tee gdb-test.log
          GDB_EXIT=${PIPESTATUS[0]}

          kill "$QEMU_PID" 2>/dev/null || true
          exit "$GDB_EXIT"

      - name: Upload disk image artifact
        uses: actions/upload-artifact@v4
        with:
          name: makar-disk
          path: makar-disk.img

