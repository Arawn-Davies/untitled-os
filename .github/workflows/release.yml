name: Release

# Triggered only by a semver tag push (e.g. v0.6.0). Per-PR sanity is covered
# by build-test.yml; this workflow exists to publish curated milestones to the
# GitHub Releases page. To cut a release: `git tag v0.X.Y && git push --tags`.
#
# Runs the full CI suite (build + ktest + gdb-iso + gdb-hdd) before building
# artifacts.
#
# Release artifacts (interactive kernel, no TEST_MODE):
#   makar.iso      – bootable CD-ROM image
#   makar-hdd.img  – installed HDD image (MBR + FAT32 + GRUB 2)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Run the full build & test suite ─────────────────────────────────────────
  build-test:
    uses: ./.github/workflows/build-test.yml

  # ── Build and publish release artifacts ────────────────────────────────────
  release:
    name: Publish release
    needs: [build-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release tag
        id: tag
        run: |
          echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build release ISO
        run: ./run.sh iso-release

      - name: Build release HDD image
        run: ./run.sh hdd-release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            makar.iso
            makar-hdd.img
          generate_release_notes: true
