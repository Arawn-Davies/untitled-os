name: Release

# Triggered two ways:
#   1. Push to main (PR merge) — auto-release tagged v<date>-<sha>, marked pre-release.
#   2. Version tag push (e.g. v0.1.0) — proper versioned release.
#
# Both paths run the full CI suite (iso-test + hdd-test) before building artifacts.
#
# Release artifacts (interactive kernel, no TEST_MODE):
#   makar.iso      – bootable CD-ROM image
#   makar-hdd.img  – installed HDD image (MBR + FAT32 + GRUB 2)

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Run the full CI suite ───────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Build and publish release artifacts ────────────────────────────────────
  release:
    name: Publish release
    needs: [ci]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            SHORT=$(git rev-parse --short HEAD)
            DATE=$(date -u +%Y.%m.%d)
            echo "name=v${DATE}-${SHORT}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release ISO
        run: ./run.sh iso-release

      - name: Build release HDD image
        run: ./run.sh hdd-release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          files: |
            makar.iso
            makar-hdd.img
          generate_release_notes: true
