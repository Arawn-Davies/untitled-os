name: Release

# Triggered two ways:
#   1. Push to main (PR merge) — auto-release tagged v<date>-<sha>, marked pre-release.
#   2. Version tag push (e.g. v0.1.0) — proper versioned release.
#
# Both paths run the full CI suite (iso-test + hdd-test) before building artifacts.
#
# Release artifacts (interactive kernel, no TEST_MODE):
#   makar.iso      – bootable CD-ROM image
#   makar-hdd.img  – installed HDD image (MBR + FAT32 + GRUB 2)

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Run the full CI suite ───────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Build and publish release artifacts ────────────────────────────────────
  release:
    name: Publish release
    needs: [ci]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            SHORT=$(git rev-parse --short HEAD)
            DATE=$(date -u +%Y.%m.%d)
            echo "name=v${DATE}-${SHORT}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      # Build the release ISO (interactive kernel, default -O2 -g flags).
      # Runs inside the compiler container; output lands in the bind-mounted
      # working directory on the host runner.
      - name: Build release ISO
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -u "$(id -u):$(id -g)" \
            -v "$PWD:/work" \
            -w /work \
            arawn780/gcc-cross-i686-elf:fast \
            bash iso.sh

      # Build the release HDD image.
      # generate-hdd.sh finds sysroot/boot/makar.kernel (just built above)
      # and skips the rebuild step, so both artifacts use the same binary.
      - name: Build release HDD image
        run: |
          rm -f makar-hdd.img
          ./generate-hdd.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          files: |
            makar.iso
            makar-hdd.img
          generate_release_notes: true
