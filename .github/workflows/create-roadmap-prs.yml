name: Create roadmap placeholder PRs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print PRs that would be created without creating them'
        type: boolean
        default: false
      base_branch:
        description: 'Base branch for placeholder PRs'
        type: string
        default: main

permissions:
  contents: write
  pull-requests: write

jobs:
  create-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create labels
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          create_label() {
            local name="$1" color="$2" description="$3"
            gh label create "$name" --color "$color" --description "$description" --force
          }
          create_label "near-term"   "0075ca" "Roadmap: near-term milestone"
          create_label "medium-term" "e4e669" "Roadmap: medium-term milestone"
          create_label "long-term"   "d93f0b" "Roadmap: long-term milestone"
          create_label "roadmap"     "cfd3d7" "Tracks a planned roadmap item"
          create_label "kernel"      "bfd4f2" "Kernel subsystem work"

      - name: Create placeholder PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
          BASE: ${{ inputs.base_branch }}
        run: |
          # create_pr <branch> <title> <labels> <stub_file> <stub_content> <pr_body>
          create_pr() {
            local branch="$1" title="$2" labels="$3"
            local stub_file="$4" stub_content="$5" pr_body="$6"

            if [ "$DRY_RUN" = "true" ]; then
              echo "DRY RUN — would create PR: '$title'  [branch: $branch, labels: $labels]"
              return
            fi

            # Skip if the branch already exists remotely
            if git ls-remote --exit-code --heads origin "$branch" > /dev/null 2>&1; then
              echo "SKIP (branch already exists): $branch"
              return
            fi

            # Create the branch from the base
            git checkout -B "$branch" "origin/$BASE"

            # Write the stub file
            mkdir -p "$(dirname "$stub_file")"
            printf '%s\n' "$stub_content" > "$stub_file"

            git add "$stub_file"
            git commit -m "chore: placeholder stub for $title"
            git push origin "$branch"

            # Open the draft PR
            gh pr create \
              --draft \
              --base "$BASE" \
              --head "$branch" \
              --title "$title" \
              --body "$pr_body" \
              --label "$labels"

            echo "Created PR: $title"

            # Return to the base so the next iteration starts cleanly
            git checkout "$BASE" 2>/dev/null || git checkout -B "$BASE" "origin/$BASE"
          }

          # Ensure we have the base branch locally
          git fetch origin "$BASE":"$BASE" 2>/dev/null || true
          git checkout "$BASE" 2>/dev/null || git checkout -B "$BASE" "origin/$BASE"

          # ------------------------------------------------------------------ #
          # NEAR-TERM
          # ------------------------------------------------------------------ #

          create_pr \
            "roadmap/keyboard-driver" \
            "feat(kernel): PS/2 keyboard driver — IRQ 1 with scan-code-to-ASCII translation" \
            "roadmap,near-term,kernel" \
            "work-in-progress/keyboard-driver.md" \
            "# Keyboard driver — PS/2 IRQ 1

