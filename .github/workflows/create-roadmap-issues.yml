name: Create roadmap issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print issues that would be created without creating them'
        type: boolean
        default: false

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create labels
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          create_label() {
            local name="$1" color="$2" description="$3"
            gh label create "$name" --color "$color" --description "$description" --force
          }
          create_label "near-term"   "0075ca" "Roadmap: near-term milestone"
          create_label "medium-term" "e4e669" "Roadmap: medium-term milestone"
          create_label "long-term"   "d93f0b" "Roadmap: long-term milestone"
          create_label "roadmap"     "cfd3d7" "Tracks a planned roadmap item"
          create_label "kernel"      "bfd4f2" "Kernel subsystem work"

      - name: Create near-term issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          create_issue() {
            local title="$1" body="$2" labels="$3"
            # Skip if an open issue with the same title already exists
            existing=$(gh issue list --state open --search "\"$title\" in:title" --json number --jq 'length')
            if [ "$existing" -gt 0 ]; then
              echo "SKIP (already exists): $title"
              return
            fi
            if [ "$DRY_RUN" = "true" ]; then
              echo "DRY RUN — would create: $title  [labels: $labels]"
            else
              gh issue create --title "$title" --body "$body" --label "$labels"
              echo "Created: $title"
            fi
          }

          # --- Near-term ---

          create_issue \
            "Keyboard driver — PS/2 IRQ 1 with scan-code-to-ASCII translation" \
            "## Summary
          Implement a PS/2 keyboard driver that handles IRQ 1 and translates hardware scan codes to ASCII characters for use by the shell.

          ## Acceptance criteria
          - [ ] IRQ 1 handler registered and enabled in the IDT
          - [ ] Set 1 scan codes translated to ASCII (printable + control keys)
          - [ ] Key events delivered to a ring buffer consumable by the shell
          - [ ] Tested in QEMU (e.g. \`keyboard: PS/2 IRQ1 handler registered\` on serial)

          ## References
          - Roadmap: [Makar × Medli — near-term](docs/makar-medli.md#near-term)
          - OSDev wiki: https://wiki.osdev.org/PS/2_Keyboard" \
            "roadmap,near-term,kernel"

          create_issue \
            "Shell — minimal interactive command loop over VGA/VESA terminal" \
            "## Summary
          Implement a minimal interactive shell that reads keyboard input and executes built-in commands, matching the Medli command vocabulary.

          ## Acceptance criteria
          - [ ] Read line from keyboard driver ring buffer with echo and backspace
          - [ ] Dispatch built-in commands: \`help\`, \`clear\`, \`ls\`, \`cd\`, \`echo\`
          - [ ] Welcome message and ASCII logo on boot
          - [ ] Kernel version string displayed at startup
          - [ ] Consistent prompt matching Medli UX

          ## References
          - Roadmap: [Makar × Medli — near-term](docs/makar-medli.md#near-term)" \
            "roadmap,near-term,kernel"

          create_issue \
            "FAT32 driver — read/write access adopting the Medli filesystem layout" \
            "## Summary
          Implement a FAT32 filesystem driver providing read and write access to FAT32 volumes, adopting the shared Makar/Medli directory layout.

          ## Acceptance criteria
          - [ ] Mount a FAT32 volume (backed by the ATA/IDE driver)
          - [ ] Read files and directories using the \`0:\\\\\` volume root convention
          - [ ] Write files and create directories
          - [ ] Adopt the shared layout: \`Users\\\\\`, \`Apps\\\\\`, \`System\\\\\`, \`Temp\\\\\`
          - [ ] Path separator is \`\\\\\` (matching Medli \`Paths.Separator\`)

          ## References
          - Roadmap: [Makar × Medli — near-term](docs/makar-medli.md#near-term)
          - Filesystem layout: [Makar × Medli — filesystem layout](docs/makar-medli.md#filesystem-layout)" \
            "roadmap,near-term,kernel"

          create_issue \
            "ATA/IDE driver — PIO-mode disk access to back the FAT32 driver" \
            "## Summary
          Implement a PIO-mode ATA/IDE disk driver to provide block-level read/write access, enabling the FAT32 driver to persist data.

          ## Acceptance criteria
          - [ ] Detect primary ATA bus master and slave drives
          - [ ] Implement 28-bit LBA PIO read (512-byte sectors)
          - [ ] Implement 28-bit LBA PIO write
          - [ ] Tested under QEMU with a disk image (\`-hda\`)

          ## References
          - Roadmap: [Makar × Medli — near-term](docs/makar-medli.md#near-term)
          - OSDev wiki: https://wiki.osdev.org/ATA_PIO_Mode" \
            "roadmap,near-term,kernel"

          # --- Medium-term ---

          create_issue \
            "Process model — round-robin scheduler with per-process address spaces" \
            "## Summary
          Implement a simple process model: a round-robin scheduler, a fork-like primitive for spawning processes, and per-process virtual address spaces built on the existing paging infrastructure.

          ## Acceptance criteria
          - [ ] Process control block (PCB) structure
          - [ ] Round-robin scheduler with a configurable time slice
          - [ ] \`kfork\`-like primitive that clones the current address space
          - [ ] Per-process page directories using the existing PMM/paging layer
          - [ ] Context switch saves and restores all general-purpose registers

          ## References
          - Roadmap: [Makar × Medli — medium-term](docs/makar-medli.md#medium-term)" \
            "roadmap,medium-term,kernel"

          create_issue \
            "ELF loader — load and execute ELF32 static binaries from FAT32 (Apps\\\\x86\\\\)" \
            "## Summary
          Implement an ELF32 loader that reads static ELF executables from the FAT32 filesystem and maps them into a new process address space for execution.

          ## Acceptance criteria
          - [ ] Parse ELF32 header and program headers
          - [ ] Map \`PT_LOAD\` segments into the process address space
          - [ ] Jump to entry point in user or kernel context
          - [ ] Executables resolved from \`Apps\\\\x86\\\\\` on the FAT32 volume

          ## References
          - Roadmap: [Makar × Medli — medium-term](docs/makar-medli.md#medium-term)
          - Binary compatibility: [Makar × Medli — binary compatibility](docs/makar-medli.md#binary-compatibility-goals)" \
            "roadmap,medium-term,kernel"

          create_issue \
            "COM loader — flat binary loader for Medli COM programs" \
            "## Summary
          Implement a simple COM binary loader that loads flat DOS-style COM executables at a fixed address and transfers control to them, enabling the lowest-common-denominator binary compatibility with Medli.

          ## Acceptance criteria
          - [ ] Load a COM binary from the FAT32 filesystem
          - [ ] Map binary to the conventional base address (e.g. 0x100)
          - [ ] Execute the binary in an isolated context
          - [ ] Basic COM programs from Medli run without modification

          ## References
          - Roadmap: [Makar × Medli — medium-term](docs/makar-medli.md#medium-term)
          - Binary compatibility: [Makar × Medli — binary compatibility](docs/makar-medli.md#binary-compatibility-goals)" \
            "roadmap,medium-term,kernel"

          create_issue \
            "Serial shell — interactive shell over UART for headless operation" \
            "## Summary
          Run the same shell command loop over the UART (COM1) so Makar can be operated headlessly and interoperate with Medli's serial daemon model.

          ## Acceptance criteria
          - [ ] Shell reads from and writes to the serial port (COM1) as well as the VGA/VESA terminal
          - [ ] Both channels active simultaneously (or selectable at compile time)
          - [ ] Compatible with Medli-style serial daemon interop
          - [ ] Tested via \`-serial stdio\` in QEMU

          ## References
          - Roadmap: [Makar × Medli — medium-term](docs/makar-medli.md#medium-term)" \
            "roadmap,medium-term,kernel"

          create_issue \
            "VICS port — port the VICS text editor from Medli C# to Makar C" \
            "## Summary
          Port the VICS text editor from the Medli C# implementation to a Makar C implementation, keeping the same key bindings and file format so users have a consistent editing experience on both OSes.

          ## Acceptance criteria
          - [ ] Open, edit, and save text files on the FAT32 volume
          - [ ] Key bindings identical to the Medli VICS implementation
          - [ ] File format compatible with the Medli VICS file format
          - [ ] Works over both VGA/VESA terminal and serial console

          ## References
          - Roadmap: [Makar × Medli — medium-term](docs/makar-medli.md#medium-term)
          - UX conventions: [Makar × Medli — shared UX conventions](docs/makar-medli.md#shared-ux-conventions)" \
            "roadmap,medium-term,kernel"

          # --- Long-term ---

          create_issue \
            "MXF executable format — joint Makar/Medli lightweight ELF-inspired binary format" \
            "## Summary
          Design and implement MXF (Makar/Medli Executable Format): a lightweight ELF-inspired format with a common header that both kernels can parse, containing native i686 code and supporting relocation.

          ## Acceptance criteria
          - [ ] Joint specification agreed upon with the Medli project
          - [ ] Common header parseable by both Makar and Medli
          - [ ] Native i686 code section with basic relocation support
          - [ ] Makar kernel loads and executes an MXF binary
          - [ ] Medli can at minimum identify MXF binaries (full execution optional)

          ## References
          - Roadmap: [Makar × Medli — long-term](docs/makar-medli.md#long-term)
          - Binary compatibility: [Makar × Medli — binary compatibility](docs/makar-medli.md#binary-compatibility-goals)" \
            "roadmap,long-term,kernel"

          create_issue \
            "Network stack — IP/TCP over NE2000-compatible NIC or virtio-net" \
            "## Summary
          Implement a minimal network stack (IP/TCP) over a NE2000-compatible NIC or virtio-net (for QEMU), enabling the same HTTP/FTP/SSH/Telnet daemon model as Medli.

          ## Acceptance criteria
          - [ ] NE2000 or virtio-net driver (packet send/receive)
          - [ ] ARP and IPv4 layer
          - [ ] TCP with basic connection management
          - [ ] At least one application-layer daemon (e.g. Telnet or FTP)
          - [ ] Interoperable with Medli's network daemon model

          ## References
          - Roadmap: [Makar × Medli — long-term](docs/makar-medli.md#long-term)" \
            "roadmap,long-term,kernel"

          create_issue \
            "User accounts — root and guest accounts in System\\\\Data\\\\usrinfo.sys" \
            "## Summary
          Implement a user account system matching the Medli account format: \`root\` and \`guest\` accounts stored in \`System\\\\Data\\\\usrinfo.sys\` on the FAT32 volume, with a login prompt at boot.

          ## Acceptance criteria
          - [ ] Login prompt displayed before the shell
          - [ ] \`root\` and \`guest\` accounts loaded from \`System\\\\Data\\\\usrinfo.sys\`
          - [ ] File format compatible with the Medli account file
          - [ ] User session context tracked (current user, privilege level)

          ## References
          - Roadmap: [Makar × Medli — long-term](docs/makar-medli.md#long-term)
          - UX conventions: [Makar × Medli — shared UX conventions](docs/makar-medli.md#shared-ux-conventions)" \
            "roadmap,long-term,kernel"

          create_issue \
            "Inter-OS file exchange — shared plain-text config and data file formats" \
            "## Summary
          Define and adopt shared plain-text (INI-style) config and data file formats readable by both Makar and Medli from a shared FAT32 partition, so configuration and data created on one OS can be used on the other.

          ## Acceptance criteria
          - [ ] Agreed INI-style format spec (section headers, key=value pairs, comments)
          - [ ] Makar reads and writes config files in the agreed format
          - [ ] Medli reads the same files without modification
          - [ ] At least one real config file (e.g. user preferences) uses the format
          - [ ] Format documented in \`docs/makar-medli.md\`

          ## References
          - Roadmap: [Makar × Medli — long-term](docs/makar-medli.md#long-term)" \
            "roadmap,long-term,kernel"
