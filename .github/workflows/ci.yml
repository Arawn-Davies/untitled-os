name: CI

# Runs on every push/PR that touches source, tests, or build scripts.
# Also callable as a reusable workflow (workflow_call) so that release.yml
# can gate the release job on both test jobs passing.

on:
  workflow_call:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sh'
      - 'scripts/**'
      - 'Dockerfile*'
      - 'docker-compose.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sh'
      - 'scripts/**'
      - 'Dockerfile*'
      - 'docker-compose.yml'

jobs:
  # ── ISO CI ─────────────────────────────────────────────────────────────────
  # Runs entirely inside the compiler container (/.dockerenv is present so
  # run.sh executes steps directly without an inner docker run).
  # Phase 1: TEST_MODE ktest suite.  Phase 2: GDB boot-checkpoint test.
  iso-test:
    name: ISO test (ktest + GDB boot)
    runs-on: ubuntu-latest
    container:
      image: arawn780/gcc-cross-i686-elf:fast
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ISO test suite
        run: ./run.sh iso-test

      - name: Upload ISO test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iso-test-logs
          path: |
            ktest.log
            gdb-test.log
            gdb-serial.log

  # ── HDD CI ─────────────────────────────────────────────────────────────────
  # Runs on the host runner so Docker (with --privileged for loop devices)
  # is available for the disk-image creation step.
  # Produces makar-hdd-test.img (separate from the interactive image).
  # GDB checks: Multiboot2 magic, all boot checkpoints, fat32_mounted() != 0.
  hdd-test:
    name: HDD test (GDB boot + FAT32 mount)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run HDD boot test
        run: ./run.sh hdd-test

      - name: Upload HDD test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hdd-test-logs
          path: |
            hdd-test-gdb.log
            hdd-test-serial.log
